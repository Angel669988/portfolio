<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Scheduled Tasks 上下文隔离机制 Demo v4</title>
  <style>
    :root {
      --bg: #f6f7fb;
      --panel: #ffffff;
      --text: #172033;
      --muted: #667085;
      --line: #e6e8ef;
      --blue: #2f6fed;
      --blue-soft: #edf4ff;
      --green: #10a37f;
      --green-soft: #e9fbf5;
      --orange: #f59e0b;
      --orange-soft: #fff7e6;
      --red: #dc2626;
      --red-soft: #fff1f1;
      --purple: #7c3aed;
      --purple-soft: #f3ecff;
      --shadow: 0 16px 45px rgba(16, 24, 40, .08);
      --radius: 18px;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      color: var(--text);
      background: radial-gradient(circle at top left, #ecf4ff, transparent 35%), var(--bg);
    }
    .app { display: grid; grid-template-columns: 330px 1fr 390px; gap: 18px; min-height: 100vh; padding: 18px; }
    .panel { background: rgba(255,255,255,.88); border: 1px solid var(--line); border-radius: var(--radius); box-shadow: var(--shadow); overflow: hidden; }
    .side { padding: 20px; }
    h1 { font-size: 22px; margin: 0 0 8px; }
    h2 { font-size: 15px; margin: 22px 0 10px; }
    p { line-height: 1.6; }
    .hint { color: var(--muted); font-size: 13px; margin: 0 0 18px; }
    .pill { display: inline-flex; align-items: center; gap: 6px; padding: 6px 10px; border-radius: 999px; font-size: 12px; background: var(--blue-soft); color: #174ea6; border: 1px solid #d6e6ff; }
    .scenario { width: 100%; text-align: left; border: 1px solid var(--line); background: white; padding: 12px; border-radius: 14px; margin: 8px 0; cursor: pointer; color: var(--text); transition: .16s ease; }
    .scenario:hover { transform: translateY(-1px); border-color: #bfd4ff; box-shadow: 0 8px 22px rgba(47,111,237,.1); }
    .scenario.active { background: var(--blue-soft); border-color: #90b7ff; }
    .scenario .title { font-weight: 700; margin-bottom: 4px; }
    .scenario .desc { color: var(--muted); font-size: 12px; line-height: 1.4; }
    .chat { display: flex; flex-direction: column; min-width: 0; }
    .chat-header { display:flex; align-items:center; justify-content:space-between; padding: 16px 18px; border-bottom:1px solid var(--line); background: rgba(255,255,255,.72); }
    .chat-title { font-weight: 800; }
    .statebar { display:flex; gap: 8px; flex-wrap: wrap; margin-top: 6px; }
    .state { font-size: 12px; padding: 4px 8px; border-radius: 999px; background: #f2f4f7; color: #344054; border:1px solid #e4e7ec; }
    .state.good { background: var(--green-soft); color: #08745f; border-color:#bcf0df; }
    .state.warn { background: var(--orange-soft); color:#985a00; border-color:#ffe0a3; }
    .messages { padding: 18px; overflow: auto; height: calc(100vh - 190px); }
    .msg { max-width: 82%; margin: 0 0 14px; padding: 13px 15px; border-radius: 16px; line-height: 1.55; position: relative; animation: pop .18s ease-out; white-space: pre-line; }
    @keyframes pop { from { opacity:0; transform: translateY(6px);} to {opacity:1; transform:none;} }
    .user { margin-left: auto; background: var(--blue); color: white; border-bottom-right-radius: 5px; }
    .assistant { background: white; border:1px solid var(--line); border-bottom-left-radius: 5px; }
    .meta-small { display:block; font-size: 11px; color: var(--muted); margin-top: 6px; }
    .task-card, .cluster-card, .failed-card { max-width: 92%; border-radius: 18px; margin: 16px 0; border: 1px solid; background: white; overflow: hidden; box-shadow: 0 10px 25px rgba(16,24,40,.07); animation: pop .18s ease-out; }
    .task-card { border-color:#c7dcff; }
    .failed-card { border-color:#fecaca; }
    .cluster-card { border-color:#ddd6fe; }
    .task-top { padding: 13px 15px; display:flex; align-items:flex-start; justify-content:space-between; gap:10px; }
    .task-card .task-top { background: var(--blue-soft); }
    .failed-card .task-top { background: var(--red-soft); }
    .cluster-card .task-top { background: var(--purple-soft); }
    .task-name { font-weight: 800; margin-bottom: 4px; }
    .task-sub { color: var(--muted); font-size: 12px; }
    .badge { font-size: 12px; padding: 5px 8px; border-radius: 999px; font-weight: 700; white-space: nowrap; }
    .badge.ok { background: var(--green-soft); color: #067647; }
    .badge.fail { background: var(--red-soft); color: #b42318; }
    .badge.merge { background: #ede9fe; color: #5b21b6; }
    .task-body { padding: 15px; line-height: 1.55; }
    .task-actions { display:flex; gap:8px; flex-wrap:wrap; padding: 0 15px 15px; }
    button.action { border: 1px solid var(--line); background: white; color: var(--text); border-radius: 11px; padding: 8px 10px; cursor:pointer; font-size: 13px; }
    button.action:hover { border-color:#9dbdff; background:#f7faff; }
    button.primary { background: var(--blue); color:white; border-color: var(--blue); }
    button.danger { background: var(--red-soft); border-color:#fecaca; color:#b42318; }
    .task-list { display: grid; gap: 10px; margin-top: 10px; }
    .task-item { border:1px solid var(--line); border-radius: 14px; padding: 12px; background:#fff; display:grid; grid-template-columns: 1fr auto; gap: 8px; align-items:center; }
    .task-item-title { font-weight: 700; }
    .task-item-desc { color: var(--muted); font-size: 12px; margin-top: 3px; }
    .inputbar { border-top:1px solid var(--line); padding: 12px; background: rgba(255,255,255,.75); display:flex; gap:8px; }
    .inputbar input { flex:1; border:1px solid var(--line); border-radius: 13px; padding: 12px; font-size:14px; outline:none; }
    .inputbar input:focus { border-color:#90b7ff; box-shadow:0 0 0 4px rgba(47,111,237,.09); }
    .inputbar button { border:0; border-radius: 13px; padding: 0 16px; background: var(--blue); color:white; font-weight:700; cursor:pointer; }
    .inspector { padding: 18px; overflow:auto; max-height: 100vh; }
    .code { background:#0b1020; color:#d9e2ff; padding: 14px; border-radius: 14px; font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 12px; line-height:1.55; overflow:auto; white-space: pre-wrap; }
    .kv { display:grid; grid-template-columns: 125px 1fr; gap:8px; font-size:13px; border-bottom:1px dashed var(--line); padding:8px 0; }
    .kv .k { color: var(--muted); }
    .toast { position: fixed; left: 50%; top: 20px; transform: translateX(-50%); background:#111827; color:white; padding: 10px 14px; border-radius: 999px; box-shadow: var(--shadow); display:none; z-index: 10; font-size: 13px; }
    .toast.show { display:block; animation: fadeToast 2.2s ease forwards; }
    @keyframes fadeToast { 0%{opacity:0; transform:translate(-50%,-8px)} 12%,82%{opacity:1; transform:translate(-50%,0)} 100%{opacity:0; transform:translate(-50%,-8px)} }

    .route-panel { margin: 12px 15px 15px; border:1px solid #d6e4ff; background:#f8fbff; border-radius:14px; padding:12px; }
    .route-title { font-weight:800; margin-bottom:8px; }
    .route-grid { display:grid; grid-template-columns: 1fr 1fr; gap:8px; }
    .route-chip { border:1px solid var(--line); border-radius:11px; padding:8px; background:white; font-size:12px; }
    .route-chip strong { display:block; font-size:13px; margin-bottom:3px; }
    .route-chip.hit { border-color:#90b7ff; background:var(--blue-soft); }
    .confidence { height:8px; background:#e5e7eb; border-radius:999px; overflow:hidden; margin-top:8px; }
    .confidence > div { height:100%; background:var(--blue); border-radius:999px; }

    .method-card { border:1px solid var(--line); border-radius:16px; background:white; margin:12px 0; overflow:hidden; box-shadow:0 8px 22px rgba(16,24,40,.05); }
    .method-head { padding:13px 14px; display:flex; justify-content:space-between; gap:10px; align-items:center; cursor:pointer; background:#fbfcff; }
    .method-title { font-weight:800; }
    .method-tag { font-size:11px; padding:4px 8px; border-radius:999px; background:var(--purple-soft); color:#5b21b6; white-space:nowrap; }
    .method-body { padding:0 14px 14px; color:#344054; font-size:13px; line-height:1.65; display:none; }
    .method-card.open .method-body { display:block; }
    .method-body ul { margin:8px 0 0 18px; padding:0; }
    .method-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-top:10px; }
    .pattern { border:1px solid var(--line); border-radius:13px; padding:10px; background:#fff; }
    .pattern strong { display:block; margin-bottom:4px; }
    .framework { display:grid; gap:9px; margin:12px 0; }
    .framework-step { border:1px solid #ddd6fe; background:#faf7ff; border-radius:14px; padding:11px; display:grid; grid-template-columns:48px 1fr; gap:10px; align-items:start; }
    .step-letter { width:36px; height:36px; border-radius:12px; background:var(--purple); color:white; display:flex; align-items:center; justify-content:center; font-weight:900; }

    @media (max-width: 1100px) { .app { grid-template-columns: 1fr; } .messages { height: 560px; } .inspector { max-height:none; } }
  </style>
</head>
<body>
  <div class="toast" id="toast"></div>
  <div class="app">
    <aside class="panel side">
      <span class="pill">⏰ Scheduled Tasks Demo v4</span>
      <h1>定时任务上下文隔离</h1>
      <p class="hint">用交互式场景说明：任务准点触发时，模型知道它是任务；任务结果不会污染当前对话主线。</p>

      <h2>场景</h2>
      <button class="scenario active" data-scenario="normal">
        <div class="title">1. 单个任务准点插入</div>
        <div class="desc">用户正在聊 PRD，AI 简报任务插入，但 active_topic 不改变。</div>
      </button>
      <button class="scenario" data-scenario="failed">
        <div class="title">2. 异步任务触发失败</div>
        <div class="desc">工具超时/权限不足时，展示失败卡片、失败原因、重试与编辑入口。</div>
      </button>
      <button class="scenario" data-scenario="multi">
        <div class="title">3. 多个任务同时触发</div>
        <div class="desc">10:00 同时触发多个任务时，合并成聚合卡片，避免刷屏打断。</div>
      </button>
      <button class="scenario" data-scenario="routing">
        <div class="title">4. 用户后续追问归因</div>
        <div class="desc">用户说“展开第二条”指向任务；说“继续刚才 PRD”回到原对话。</div>
      </button>
      <button class="scenario" data-scenario="multiRouting">
        <div class="title">5. 多任务后的目标路由</div>
        <div class="desc">多个任务聚合后，判断用户下一句是原话题、某个任务、整个任务组还是任务管理。</div>
      </button>
      <button class="scenario" data-scenario="methodology">
        <div class="title">6. 可抽象方法论</div>
        <div class="desc">把 Scheduled Tasks 抽象成主动事件交互框架：E-CART、设计模式、复用场景。</div>
      </button>

      <h2>可操作模拟</h2>
      <button class="scenario" onclick="resetDemo()"><div class="title">重置 Demo</div><div class="desc">恢复到初始聊天状态。</div></button>
      <button class="scenario" onclick="insertNormalTask()"><div class="title">触发：每日 AI 简报</div><div class="desc">模拟一个成功完成的定时任务。</div></button>
      <button class="scenario" onclick="insertFailedTask()"><div class="title">触发：失败任务</div><div class="desc">模拟异步任务执行失败。</div></button>
      <button class="scenario" onclick="insertMultiTask()"><div class="title">触发：多任务聚合</div><div class="desc">模拟多个任务同一时间完成。</div></button>
    </aside>

    <main class="panel chat">
      <div class="chat-header">
        <div>
          <div class="chat-title">当前会话：Word/PDF Agent PRD 讨论</div>
          <div class="statebar">
            <span class="state good" id="activeTopic">active_topic = PRD_Design</span>
            <span class="state" id="lastSource">last_source = user</span>
            <span class="state warn" id="pollution">context_pollution = false</span>
          </div>
        </div>
        <span class="pill" id="clock">10:00</span>
      </div>
      <div class="messages" id="messages"></div>
      <div class="inputbar">
        <input id="userInput" placeholder="试试输入：第二个展开 / 全部展开 / 继续刚才 PRD / 以后别发了" />
        <button onclick="sendUserMessage()">发送</button>
      </div>
    </main>

    <aside class="panel inspector">
      <h1>机制说明</h1>
      <p class="hint">右侧展示当前选中场景的消息协议、路由规则和产品设计要点。</p>
      <div id="explain"></div>
      <h2>当前消息元数据</h2>
      <div class="code" id="metadata"></div>
    </aside>
  </div>

<script>
  const messagesEl = document.getElementById('messages');
  const explainEl = document.getElementById('explain');
  const metadataEl = document.getElementById('metadata');
  const activeTopicEl = document.getElementById('activeTopic');
  const lastSourceEl = document.getElementById('lastSource');
  const pollutionEl = document.getElementById('pollution');
  const inputEl = document.getElementById('userInput');
  const toastEl = document.getElementById('toast');

  let state = {
    active_topic: 'PRD_Design',
    last_source: 'user',
    context_pollution: false,
    latest_task_message: null,
    latest_cluster: null,
    pre_task_anchor: null,
    selected_scenario: 'normal'
  };

  const scenarioExplanations = {
    normal: {
      title: '单个任务准点插入',
      points: [
        ['消息类型', 'source=scheduled_task，不伪装成 user message。'],
        ['状态隔离', 'affects_conversation_state=false，所以不覆盖 active_topic。'],
        ['UI 表达', '任务结果用卡片展示，用户知道这不是模型突然跑题。']
      ],
      code: `{
  "source": "scheduled_task",
  "role": "assistant",
  "metadata": {
    "task_id": "task_ai_daily",
    "task_run_id": "run_20260625_1000",
    "trigger_type": "scheduled",
    "affects_conversation_state": false,
    "context_policy": {
      "include_current_conversation": "none",
      "include_user_memory": true,
      "include_task_history": true,
      "include_tools": ["web_search"]
    }
  }
}`
    },
    failed: {
      title: '异步任务触发失败处理',
      points: [
        ['失败可见', '不要静默失败，生成 failed task card，说明失败原因。'],
        ['可恢复', '提供重试、编辑任务、暂停任务、查看日志入口。'],
        ['不打断', '失败卡片同样不改变 active_topic，也不清空用户当前输入。']
      ],
      code: `{
  "source": "scheduled_task",
  "status": "failed",
  "metadata": {
    "task_id": "task_weekend_events",
    "task_run_id": "run_20260625_1000_failed",
    "error_code": "TOOL_TIMEOUT",
    "error_message": "活动检索工具超时",
    "retryable": true,
    "next_retry_policy": "manual_or_next_schedule",
    "affects_conversation_state": false
  }
}`
    },
    multi: {
      title: '多个定时任务同时触发处理',
      points: [
        ['聚合优先', '同一时间窗口内多个任务完成，先合并成一个任务中心卡片。'],
        ['避免刷屏', '短提醒折叠，长简报可展开；用户主动点击再查看全文。'],
        ['分级通知', 'reminder 用轻通知，briefing 用卡片，monitoring 无变化则可静默。']
      ],
      code: `{
  "source": "scheduled_task_cluster",
  "cluster_window": "10:00-10:01",
  "task_runs": [
    {"task_id": "task_ai_daily", "status": "success"},
    {"task_id": "task_drink_water", "status": "success"},
    {"task_id": "task_weekend_events", "status": "failed"}
  ],
  "delivery_strategy": "aggregate_card",
  "affects_conversation_state": false
}`
    },
    routing: {
      title: '用户后续追问归因',
      points: [
        ['指向任务', '“展开第二条”“这个任务重试”绑定 latest_scheduled_task。'],
        ['回到原话题', '“继续刚才 PRD”绑定 active_topic_before_task。'],
        ['模糊处理', '低置信度时轻量声明理解，不频繁追问。']
      ],
      code: `{
  "user_message": "展开第二条",
  "intent_target": "latest_scheduled_task",
  "confidence": 0.86,
  "reason": "用户引用了任务卡片中的编号条目"
}
{
  "user_message": "继续刚才 PRD",
  "intent_target": "current_conversation",
  "confidence": 0.93,
  "reason": "用户显式要求回到任务插入前的主话题"
}`
    },
    multiRouting: {
      title: '多个任务后的目标路由',
      points: [
        ['候选目标', 'original_conversation / task_cluster / specific_task / task_management / ambiguous。'],
        ['判断优先级', '显式编号或任务名 > 管理动作 > 回到原话题 > 语义匹配 > 模糊兜底。'],
        ['风险策略', '内容追问可带假设回答；暂停、删除、改频率等高影响操作必须确认。']
      ],
      code: `{
  "cluster_id": "cluster_20260625_1000",
  "pre_task_anchor": {
    "active_topic_before_task": "PRD_Design",
    "pending_intent_before_task": "完善 Word/PDF Agent PRD"
  },
  "candidate_targets": [
    "original_conversation",
    "task_cluster",
    "task_ai_daily",
    "task_weekend_events",
    "task_drink_water",
    "task_management"
  ],
  "routing_priority": [
    "explicit_click_or_reference",
    "task_management_intent",
    "return_to_original_topic",
    "semantic_task_match",
    "semantic_original_topic_match",
    "ambiguous_fallback"
  ]
}`
    },
    methodology: {
      title: '可抽象方法论：E-CART 主动事件交互框架',
      points: [
        ['核心抽象', '系统主动产生的内容是 Event，不是普通对话消息。'],
        ['关键问题', '主动事件插入后，用户下一句需要先做归因，再决定回答对象。'],
        ['复用范围', '适用于定时任务、异步工具结果、文件处理完成、多 Agent 返回、系统通知等。']
      ],
      code: `{
  "framework": "E-CART",
  "principle": "Event != Conversation",
  "steps": [
    {"E": "Event Source：识别事件来源"},
    {"C": "Context Isolation：隔离事件上下文"},
    {"A": "Anchor Preservation：保存原会话锚点"},
    {"R": "Reply Target Routing：用户下一轮输入做目标归因"},
    {"T": "Trustworthy Fallback：按风险等级兜底"}
  ],
  "design_patterns": [
    "Source-aware Message",
    "Non-mutating Event Card",
    "Pre-interruption Anchor",
    "Context Whitelist",
    "Event Cluster",
    "Target Router",
    "Risk-tiered Confirmation",
    "Explainable Routing",
    "UI-assisted Disambiguation"
  ]
}`
    }
  };

  function renderState() {
    activeTopicEl.textContent = `active_topic = ${state.active_topic}`;
    lastSourceEl.textContent = `last_source = ${state.last_source}`;
    pollutionEl.textContent = `context_pollution = ${state.context_pollution}`;
  }

  function showToast(text) {
    toastEl.textContent = text;
    toastEl.classList.remove('show');
    void toastEl.offsetWidth;
    toastEl.classList.add('show');
  }

  function scrollBottom() { messagesEl.scrollTop = messagesEl.scrollHeight; }

  function addMsg(role, text, meta = {}) {
    const div = document.createElement('div');
    div.className = `msg ${role}`;
    div.textContent = text;
    if (meta.note) {
      const span = document.createElement('span');
      span.className = 'meta-small';
      span.textContent = meta.note;
      div.appendChild(span);
    }
    messagesEl.appendChild(div);
    state.last_source = role === 'user' ? 'user' : 'assistant';
    renderState();
    scrollBottom();
  }

  function addTaskCard({status='success', title, sub, body, taskId, runId, actions=[]}) {
    const card = document.createElement('div');
    card.className = status === 'failed' ? 'failed-card' : 'task-card';
    card.innerHTML = `
      <div class="task-top">
        <div>
          <div class="task-name">${status === 'failed' ? '⚠️' : '⏰'} 定时任务：${title}</div>
          <div class="task-sub">${sub}</div>
        </div>
        <span class="badge ${status === 'failed' ? 'fail' : 'ok'}">${status === 'failed' ? '执行失败' : '已完成'}</span>
      </div>
      <div class="task-body">${body}</div>
      <div class="task-actions"></div>
    `;
    const actionBox = card.querySelector('.task-actions');
    actions.forEach(a => {
      const btn = document.createElement('button');
      btn.className = 'action ' + (a.kind || '');
      btn.textContent = a.label;
      btn.onclick = a.onClick;
      actionBox.appendChild(btn);
    });
    messagesEl.appendChild(card);
    state.latest_task_message = { taskId, runId, status, title };
    state.last_source = 'scheduled_task';
    state.context_pollution = false;
    renderState();
    updateMetadata({source: 'scheduled_task', status, task_id: taskId, task_run_id: runId, affects_conversation_state: false});
    scrollBottom();
  }

  function addClusterCard() {
    const card = document.createElement('div');
    card.className = 'cluster-card';
    card.innerHTML = `
      <div class="task-top">
        <div>
          <div class="task-name">🧩 10:00 有 3 个定时任务触发</div>

  function classifyNextTurn(text) {
    const hasCluster = !!state.latest_cluster;

      return { hit:'original_conversation', label:'original_conversation', confidence:0.94, reason:'出现“继续/刚才/PRD”等回到原话题信号', strategy:'恢复 pre_task_anchor，不使用任务卡片作为主上下文', metadata:{ target:'original_conversation', active_topic_before_task:'PRD_Design', confidence:0.94 } };
    }
    if (text.includes('全部') || text.includes('这几个') || text.includes('所有任务')) {
      return { hit:'task_cluster', label:'task_cluster', confidence:0.91, reason:'用户指向整个任务集合', strategy:'展开或总结 cluster 内全部任务', metadata:{ target:'task_cluster', cluster_id:'cluster_20260625_1000', action:'expand_all', confidence:0.91 } };
    }
    if (text.includes('以后别发') || text.includes('暂停') || text.includes('删除') || text.includes('改到') || text.includes('改成')) {
      const explicit = text.includes('第二') || text.includes('活动') || text.includes('简报') || text.includes('喝水');
      return { hit:'task_management', label: explicit ? 'task_management → specific_task' : 'ambiguous task_management', confidence: explicit ? 0.88 : 0.52, reason: explicit ? '管理动作 + 明确任务引用' : '管理动作高影响，但“这个”在多任务场景下不明确', strategy: explicit ? '执行前仍可二次确认' : '必须反问确认，不直接暂停/删除', metadata:{ target: explicit ? 'task_management' : 'ambiguous', action:'pause_or_edit', requires_confirmation:true, confidence: explicit ? 0.88 : 0.52 } };
    }
    if (text.includes('第二') || text.includes('周末') || text.includes('活动') || text.includes('室内') || text.includes('展览')) {
      return { hit:'task_weekend_events', label:'specific_task: 北京周末活动推荐', confidence:text.includes('第二') ? 0.96 : 0.86, reason:text.includes('第二') ? '显式编号“第二个”命中聚合卡片第 2 项' : '语义与“周末活动/室内/展览”任务匹配', strategy:'绑定 task_id=task_weekend_events 后回答', metadata:{ target:'specific_task', task_id:'task_weekend_events', cluster_id:'cluster_20260625_1000', action:'expand', confidence:text.includes('第二') ? 0.96 : 0.86 } };
    }
    if (text.includes('第一') || text.includes('AI') || text.includes('简报') || text.includes('大模型')) {
      return { hit:'task_ai_daily', label:'specific_task: 每日 AI 简报', confidence:text.includes('第一') ? 0.96 : 0.87, reason:'编号/标题/关键词命中 AI 简报任务', strategy:'绑定 task_id=task_ai_daily 后回答', metadata:{ target:'specific_task', task_id:'task_ai_daily', cluster_id:'cluster_20260625_1000', action:'expand', confidence:0.87 } };
    }
    if (text.includes('第三') || text.includes('喝水')) {
      return { hit:'task_drink_water', label:'specific_task: 喝水提醒', confidence:0.93, reason:'编号或关键词命中喝水提醒', strategy:'展示轻量提醒内容', metadata:{ target:'specific_task', task_id:'task_drink_water', cluster_id:'cluster_20260625_1000', action:'view', confidence:0.93 } };
    }
    return { hit:'original_conversation', label: hasCluster ? 'ambiguous → prefer_original_conversation' : 'current_conversation', confidence:0.61, reason:'没有明确指向任务；默认不让任务插入改变主线', strategy:'低置信度时保持原会话，提示可用“第几个/任务名”追问', metadata:{ target:'ambiguous', fallback:'prefer_original_topic', confidence:0.61 } };
  }

  function answerByRoute(result) {

      return;
    }
    if (result.hit === 'task_ai_daily') return answerTaskSecond();
    if (result.hit === 'task_drink_water') {
      addMsg('assistant', '你指向的是「喝水提醒」。这是轻量 reminder 类型，只展示短提醒：喝一杯水，起身活动一下肩颈。', {note:'intent_target = specific_task: task_drink_water'});

  function sendUserMessage() {
    const text = inputEl.value.trim();
    if (!text) return;
    addMsg('user', text);
    inputEl.value = '';

    // 多任务聚合后：下一轮输入先经过 Target Router，而不是默认接最近一条消息。
    if (state.latest_cluster || state.selected_scenario === 'multiRouting') {
      renderExplanation('multiRouting');
      const route = classifyNextTurn(text);
      return answerByRoute(route);
    }

    if (text.includes('展开') || text.includes('第二条') || text.includes('简报')) {
      renderExplanation('routing');
      answerTaskSecond();
    } else if (text.includes('继续') || text.includes('刚才') || text.toLowerCase().includes('prd')) {
      renderExplanation('routing');
      continuePRD();
    } else if (text.includes('重试') || text.includes('失败')) {
      renderExplanation('failed');
      retryFailedTask();
    } else if (text.includes('多个') || text.includes('同时') || text.includes('聚合')) {
      renderExplanation('multi');
      insertMultiTask();
    } else {
      addMsg('assistant', '我会先保持当前 PRD 主线不变。若你是在追问任务卡片，可以说“展开第二条”；若要回到原话题，可以说“继续刚才 PRD”。', {note:'ambiguous_target，默认不切换 active_topic'});

  }

        <div class="method-card open"><div class="method-head" onclick="toggleMethodCard(this)"><div class="method-title">文件处理完成</div><span class="method-tag">async_tool_result</span></div><div class="method-body">文件解析结果插入后，用户说“改一下标题”，需要判断是改文件标题、报告标题，还是原对话标题。</div></div>
        <div class="method-card open"><div class="method-head" onclick="toggleMethodCard(this)"><div class="method-title">多 Agent 返回方案</div><span class="method-tag">agent_result_cluster</span></div><div class="method-body">多个 Agent 同时返回后，用户说“用第二个方案”，要明确是哪个 Agent、哪个方案、是否涉及执行动作。</div></div>
        <div class="method-card open"><div class="method-head" onclick="toggleMethodCard(this)"><div class="method-title">邮件草稿生成完成</div><span class="method-tag">tool_status</span></div><div class="method-body">用户说“发出去”属于高风险状态变更，必须确认具体草稿和收件人，不能仅凭最近消息执行。</div></div>
      </div>`;
    messagesEl.appendChild(card);
    updateMetadata({reusable_scenarios:['file_processing_done','multi_agent_results','email_draft_ready','scheduled_tasks','system_notifications']});
    scrollBottom();
  }

  document.querySelectorAll('.scenario[data-scenario]').forEach(btn => {
    btn.addEventListener('click', () => {
      renderExplanation(btn.dataset.scenario);
      if (btn.dataset.scenario === 'failed') insertFailedTask();
      if (btn.dataset.scenario === 'multi') insertMultiTask();
      if (btn.dataset.scenario === 'normal') insertNormalTask();
      if (btn.dataset.scenario === 'routing') showToast('在输入框试试：展开第二条 / 继续刚才 PRD');
      if (btn.dataset.scenario === 'multiRouting') insertMultiRoutingDemo();
      if (btn.dataset.scenario === 'methodology') renderMethodologyDemo();
    });
  });

  inputEl.addEventListener('keydown', e => { if (e.key === 'Enter') sendUserMessage(); });

  resetDemo();
  renderExplanation('normal');
</script>
</body>
</html>
